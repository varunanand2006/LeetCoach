<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB340"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="16" height="16" rx="3.5" fill="url(#bg)"/>

  <!-- Left angle bracket < -->
  <polyline
    points="4.5,5.5 2,8 4.5,10.5"
    fill="none"
    stroke="#ffffff"
    stroke-opacity="0.8"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Center 'L' -->
  <polyline
    points="7,5.5 7,10.5 10,10.5"
    fill="none"
    stroke="url(#primaryGrad)"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Right angle bracket > -->
  <polyline
    points="11.5,5.5 14,8 11.5,10.5"
    fill="none"
    stroke="#ffffff"
    stroke-opacity="0.8"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Small Top-right AI Sparkle -->
  <path 
    d="M 13 1 Q 13 2.5 14.5 2.5 Q 13 2.5 13 4 Q 13 2.5 11.5 2.5 Q 13 2.5 13 1 Z" 
    fill="url(#primaryGrad)"
  />
</svg>
