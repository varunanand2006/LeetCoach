<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCoach</title>
  <link rel="stylesheet" href="vendor/prism-theme.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <div id="header">
      <span id="problem-name">LeetCoach</span>
      <button id="coaching-toggle" class="coaching-toggle" data-tooltip="Learn mode&#10;Click to switch to Practice">
        <span id="coaching-icon">🎓</span>
      </button>
      <div id="usage-indicator" data-tooltip="100 prompts left">
        ✨
      </div>
    </div>

    <!-- Chat area -->
    <div id="chat">
      <div id="empty-state">Open a LeetCode problem to start coaching</div>
    </div>

    <!-- Input row -->
    <div id="input-row">
      <div id="mode-bar">
        <button id="btn-hint" class="mode-btn" title="Get a progressive hint">
          <i class="gg-key"></i> Hint <span id="hint-level-badge">1</span>
        </button>
        <button id="btn-analyze" class="mode-btn" title="Analyze your current code">
          <i class="gg-play-list-search"></i> Analyze
        </button>
        <button id="btn-dsa" class="mode-btn" title="Data structure &amp; algorithm tips">
          <i class="gg-list-tree"></i> DSA Tips
        </button>
      </div>
      <textarea
        id="input"
        placeholder="Ask LeetCoach..."
        rows="1"
      ></textarea>
    </div>

  </div>

  <script src="vendor/prism.js"></script>
  <script type="module" src="src/index.js"></script>
</body>
</html>
