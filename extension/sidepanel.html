<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCoach</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* -------------------------------------------------------------------------
       Layout
    ------------------------------------------------------------------------- */

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    /* -------------------------------------------------------------------------
       Header
    ------------------------------------------------------------------------- */

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #111111;
      border-bottom: 1px solid #2e2e2e;
      flex-shrink: 0;
      gap: 10px;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #title {
      font-size: 15px;
      font-weight: 700;
      color: #ffa116;
      letter-spacing: 0.3px;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
      justify-content: flex-end;
    }

    #problem-name {
      font-size: 12px;
      color: #a0a0a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }

    #difficulty-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      display: none;
    }

    #difficulty-badge.easy {
      background: rgba(44, 187, 93, 0.15);
      color: #2cbb5d;
      display: inline-block;
    }

    #difficulty-badge.medium {
      background: rgba(255, 184, 0, 0.15);
      color: #ffb800;
      display: inline-block;
    }

    #difficulty-badge.hard {
      background: rgba(239, 71, 67, 0.15);
      color: #ef4743;
      display: inline-block;
    }

    #clear-btn {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 15px;
      padding: 3px 5px;
      border-radius: 4px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s ease;
    }

    #clear-btn:hover {
      color: #aaa;
      background: #2a2a2a;
    }

    /* -------------------------------------------------------------------------
       Chat area
    ------------------------------------------------------------------------- */

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #chat::-webkit-scrollbar {
      width: 5px;
    }

    #chat::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    #chat::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 3px;
    }

    #chat::-webkit-scrollbar-thumb:hover {
      background: #4a4a4a;
    }

    #empty-state {
      color: #555;
      font-size: 13px;
      text-align: center;
      margin: auto;
      line-height: 1.6;
      padding: 20px;
    }

    /* -------------------------------------------------------------------------
       Message bubbles
    ------------------------------------------------------------------------- */

    .message {
      max-width: 85%;
      padding: 9px 12px;
      border-radius: 12px;
      word-wrap: break-word;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 13px;
    }

    .message.user {
      align-self: flex-end;
      background: #ffa116;
      color: #111111;
      border-bottom-right-radius: 3px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #282828;
      color: #e0e0e0;
      border-bottom-left-radius: 3px;
      border: 1px solid #333;
    }

    /* -------------------------------------------------------------------------
       Input row
    ------------------------------------------------------------------------- */

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      background: #111111;
      border-top: 1px solid #2e2e2e;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: #222222;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 9px 11px;
      font-family: inherit;
      font-size: 13px;
      resize: none;
      outline: none;
      line-height: 1.45;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.15s ease;
    }

    #input::placeholder {
      color: #555;
    }

    #input:focus {
      border-color: #ffa116;
    }

    #input::-webkit-scrollbar {
      width: 4px;
    }

    #input::-webkit-scrollbar-track {
      background: #222;
    }

    #input::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 2px;
    }

    #input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #send {
      background: #ffa116;
      color: #111111;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s ease, opacity 0.15s ease;
      line-height: 1.45;
    }

    #send:hover:not(:disabled) {
      background: #e8920f;
    }

    #send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- Header -->
    <div id="header">
      <div id="header-left">
        <span id="title">LeetCoach</span>
      </div>
      <div id="header-right">
        <span id="problem-name"></span>
        <span id="difficulty-badge"></span>
        <button id="clear-btn" title="Clear chat">&#x1F5D1;</button>
      </div>
    </div>

    <!-- Chat area -->
    <div id="chat">
      <div id="empty-state">Open a LeetCode problem to start coaching</div>
    </div>

    <!-- Input row -->
    <div id="input-row">
      <textarea
        id="input"
        placeholder="Ask a question..."
        rows="1"
      ></textarea>
      <button id="send">Send</button>
    </div>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
