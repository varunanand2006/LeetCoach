<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCoach</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* -------------------------------------------------------------------------
       Layout
    ------------------------------------------------------------------------- */

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    /* -------------------------------------------------------------------------
       Header
    ------------------------------------------------------------------------- */

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #111111;
      border-bottom: 1px solid #2e2e2e;
      flex-shrink: 0;
      gap: 10px;
      min-width: 0;
    }

    #problem-name {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    /* -------------------------------------------------------------------------
       Chat area
    ------------------------------------------------------------------------- */

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #chat::-webkit-scrollbar {
      width: 5px;
    }

    #chat::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    #chat::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 3px;
    }

    #chat::-webkit-scrollbar-thumb:hover {
      background: #4a4a4a;
    }

    #empty-state {
      color: #555;
      font-size: 13px;
      text-align: center;
      margin: auto;
      line-height: 1.6;
      padding: 20px;
    }

    /* -------------------------------------------------------------------------
       Message bubbles
    ------------------------------------------------------------------------- */

    .message {
      max-width: 85%;
      padding: 9px 12px;
      border-radius: 12px;
      word-wrap: break-word;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 13px;
    }

    .message.user {
      align-self: flex-end;
      background: #ffa116;
      color: #111111;
      border-bottom-right-radius: 3px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #282828;
      color: #e0e0e0;
      border-bottom-left-radius: 3px;
      border: 1px solid #333;
      white-space: normal;
    }

    .message.assistant p { margin-bottom: 8px; }
    .message.assistant p:last-child { margin-bottom: 0; }

    .message.assistant h3,
    .message.assistant h4 {
      font-size: 13px;
      font-weight: 700;
      color: #ffa116;
      margin: 10px 0 4px;
    }
    .message.assistant h3:first-child,
    .message.assistant h4:first-child { margin-top: 0; }

    .message.assistant pre {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 6px 0;
    }

    .message.assistant pre code {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      color: #d4d4d4;
      background: none;
      padding: 0;
      border-radius: 0;
    }

    .message.assistant code {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      background: #1e1e1e;
      color: #ce9178;
      padding: 1px 5px;
      border-radius: 3px;
    }

    .message.assistant ul,
    .message.assistant ol {
      padding-left: 18px;
      margin: 4px 0 8px;
    }

    .message.assistant li { margin-bottom: 3px; line-height: 1.5; }

    .message.assistant hr {
      border: none;
      border-top: 1px solid #3a3a3a;
      margin: 8px 0;
    }

    /* -------------------------------------------------------------------------
       Spinner
    ------------------------------------------------------------------------- */

    .gg-spinner {
      transform: scale(var(--ggs, 1));
    }
    .gg-spinner,
    .gg-spinner::after,
    .gg-spinner::before {
      box-sizing: border-box;
      position: relative;
      display: block;
      width: 20px;
      height: 20px;
    }
    .gg-spinner::after,
    .gg-spinner::before {
      content: "";
      position: absolute;
      border-radius: 100px;
    }
    .gg-spinner::before {
      animation: spinner 1s cubic-bezier(0.6, 0, 0.4, 1) infinite;
      border: 3px solid transparent;
      border-top-color: currentColor;
    }
    .gg-spinner::after {
      border: 3px solid;
      opacity: 0.2;
    }
    @keyframes spinner {
      0%  { transform: rotate(0deg); }
      to  { transform: rotate(359deg); }
    }

    .message.assistant .gg-spinner::before {
      border-color: #14213D #14213D #14213D #E5E5E5;
    }
    .message.assistant .gg-spinner::after {
      opacity: 0;
    }

    /* -------------------------------------------------------------------------
       Mode bar
    ------------------------------------------------------------------------- */

    #mode-bar {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: #111111;
      border-top: 1px solid #2e2e2e;
      flex-shrink: 0;
    }

    .mode-btn {
      flex: 1;
      background: #222222;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 4px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
      white-space: nowrap;
    }

    .mode-btn:hover:not(:disabled) {
      background: #2e2e2e;
      border-color: #ffa116;
      color: #ffa116;
    }

    .mode-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #hint-level-badge {
      display: inline-block;
      background: #ffa116;
      color: #111111;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      width: 15px;
      height: 15px;
      line-height: 15px;
      text-align: center;
      margin-left: 3px;
      vertical-align: middle;
    }

    /* -------------------------------------------------------------------------
       Input row
    ------------------------------------------------------------------------- */

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      background: #111111;
      border-top: 1px solid #2e2e2e;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: #222222;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 9px 11px;
      font-family: inherit;
      font-size: 13px;
      resize: none;
      outline: none;
      line-height: 1.45;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.15s ease;
    }

    #input::placeholder {
      color: #555;
    }

    #input:focus {
      border-color: #ffa116;
    }

    #input::-webkit-scrollbar {
      width: 4px;
    }

    #input::-webkit-scrollbar-track {
      background: #222;
    }

    #input::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 2px;
    }

    #input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #send {
      background: #ffa116;
      border: none;
      border-radius: 6px;
      padding: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s ease, background 0.15s ease;
    }

    #send:hover:not(:disabled) {
      background: #e8920f;
    }

    #send:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .gg-arrow-up-r {
      box-sizing: border-box;
      position: relative;
      display: block;
      width: 22px;
      height: 22px;
      border: 2px solid #000000;
      transform: scale(var(--ggs, 1));
      border-radius: 4px;
    }
    .gg-arrow-up-r::after,
    .gg-arrow-up-r::before {
      content: "";
      display: block;
      box-sizing: border-box;
      position: absolute;
      top: 4px;
    }
    .gg-arrow-up-r::after {
      width: 6px;
      height: 6px;
      border-top: 2px solid #000000;
      border-left: 2px solid #000000;
      transform: rotate(45deg);
      left: 6px;
    }
    .gg-arrow-up-r::before {
      width: 2px;
      height: 10px;
      left: 8px;
      background: #000000;
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- Header -->
    <div id="header">
      <span id="problem-name"></span>
    </div>

    <!-- Chat area -->
    <div id="chat">
      <div id="empty-state">Open a LeetCode problem to start coaching</div>
    </div>

    <!-- Mode buttons -->
    <div id="mode-bar">
      <button id="btn-hint" class="mode-btn" title="Get a progressive hint">
        Hint <span id="hint-level-badge">1</span>
      </button>
      <button id="btn-analyze" class="mode-btn" title="Analyze your current code">
        Analyze
      </button>
      <button id="btn-dsa" class="mode-btn" title="Data structure &amp; algorithm tips">
        DSA Tips
      </button>
    </div>

    <!-- Input row -->
    <div id="input-row">
      <textarea
        id="input"
        placeholder="Ask a question..."
        rows="1"
      ></textarea>
      <button id="send"><i class="gg-arrow-up-r"></i></button>
    </div>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
