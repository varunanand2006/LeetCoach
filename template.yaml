AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: leetcoach-users
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: lambda_function.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref UsersTable
          # Shared secret validated against x-api-key header sent by the extension.
          # Set this to a strong random value and mirror it in sidepanel.js API_KEY.
          API_KEY: "4d36f3f48a48b7447c6344c503453500ff4675dc33ddce9453e973ddb1ebe71d"
          HAIKU_MODEL_ID: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
          SONNET_MODEL_ID: "us.anthropic.claude-sonnet-4-6"
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModelWithResponseStream
              Resource:
                # Cross-region inference profiles (us.anthropic.* model IDs)
                - !Sub 'arn:aws:bedrock:us-east-1:${AWS::AccountId}:inference-profile/us.anthropic.claude-*'
                # Underlying foundation models Bedrock routes to internally
                - 'arn:aws:bedrock:*::foundation-model/anthropic.claude-*'
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource: !GetAtt UsersTable.Arn
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowOrigins:
            - '*'
          AllowHeaders:
            - 'Content-Type'
            - 'x-api-key'
          AllowMethods:
            - 'POST'

Outputs:
  ChatFunctionUrl:
    Description: "Paste this URL into API_URL in extension/sidepanel.js"
    Value: !GetAtt ChatFunctionUrl.FunctionUrl
  UsersTableName:
    Description: "DynamoDB table for user usage tracking"
    Value: !Ref UsersTable
