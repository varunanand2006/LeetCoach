AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: leetcoach-users
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: lambda_function.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref UsersTable
      Policies:
        - AmazonBedrockFullAccess
        - AmazonDynamoDBFullAccess
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowOrigins:
            - '*'
          AllowHeaders:
            - 'Content-Type'
          AllowMethods:
            - 'POST'

Outputs:
  ChatFunctionUrl:
    Description: "Paste this URL into API_URL in extension/sidepanel.js"
    Value: !GetAtt ChatFunctionUrl.FunctionUrl
  UsersTableName:
    Description: "DynamoDB table for user usage tracking"
    Value: !Ref UsersTable
